<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Time Table</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      padding: 20px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }
    th, td {
      border: 1px solid #444;
      padding: 10px;
      text-align: center;
    }
    th {
      background: #222;
    }
  </style>
</head>
<body>

<section id="timetable">
    <h2>🗓️ BCA Student Time Table</h2>
    <table>
      <tr>
        <th>Day</th><th>9:00 - 10:00</th><th>10:00 - 11:00</th><th>11:00 - 12:00</th>
        <th>1:00 - 2:00</th><th>2:00 - 3:00</th>
      </tr>
      <tr><td>Monday</td><td> - </td><td>English</td><td>C</td><td>Cfo</td><td>Ddco</td></tr>
      <tr><td>Tuesday</td><td>English</td><td>Maths</td><td>Ddco</td><td> - </td><td>Bec</td></tr>
      <tr><td>Wednesday</td><td>Maths</td><td>C</td><td>- </td><td>Cfo</td><td>Ddco</td></tr>
      <tr><td>Thursday</td><td>C</td><td> - </td><td>Ddco</td><td>English</td><td>Ddco</td></tr>
      <tr><td>Friday</td><td>C</td><td>Ddco</td><td>Ddco</td><td> - </td><td> - </td></tr>
    </table>
</section>

</body>
</html>
