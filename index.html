<!-- FILE: index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Smart Classroom Login</title>
    <style>
        body { font-family: Arial; background: #f2f2f2; }
        .login-box {
            width: 350px; background: #fff; padding: 20px;
            margin: 80px auto; box-shadow: 0 0 10px #aaa; border-radius: 8px;
        }
        input, select { width: 100%; padding: 10px; margin: 8px 0; }
        button { width: 100%; padding: 10px; background: #3498db; color: #fff;
            border: none; cursor: pointer; font-size: 16px; }
        button:hover { background: #2179b5; }
    </style>
</head>
<body>

<div class="login-box">
    <h2>Smart Classroom Login</h2>

    <label>Email</label>
    <input id="email" type="text">

    <label>Password</label>
    <input id="password" type="password">

    <label>Select Role</label>
    <select id="role">
        <option value="student">Student</option>
        <option value="teacher">Teacher</option>
    </select>

    <button onclick="login()">Login</button>
</div>

<script>
function login() {
    let email = email.value.trim();
    let password = password.value.trim();
    let role = role.value;

    if (email === "" || password === "") {
        alert("Enter details!");
        return;
    }

    localStorage.setItem("current", JSON.stringify({ email, role }));
    location.href = "dashboard.html";
}
</script>

</body>
</html>
