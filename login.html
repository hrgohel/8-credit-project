<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login</title>
  <style>
    body {
      background-color: #111;
      color: white;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .login-box {
      background: #222;
      padding: 30px;
      border-radius: 12px;
      text-align: center;
      width: 300px;
      box-shadow: 0 0 10px black;
    }
    input, select {
      width: 90%;
      padding: 10px;
      margin: 10px 0;
      border: none;
      border-radius: 8px;
    }
    button {
      background: #4CAF50;
      color: white;
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      margin-top: 10px;
    }
    button:hover {
      background: #43a047;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <h2>Login</h2>
    <input type="text" id="name" placeholder="Enter your name" required>
    <input type="password" id="password" placeholder="Enter password" required>
    <button onclick="login()">Login</button>
    <br>
    <a href="Register.html" style="color: #4CAF50; text-decoration: none; display: inline-block; margin-top: 15px;">Don't have an account? Register here</a>
  </div>

  <script>
    async function login(){
      let name = document.getElementById("name").value;
      let password = document.getElementById("password").value;

      if(name === "" || password === ""){
        alert("Please enter both Name and Password!");
        return;
      }

      try {
        let response = await fetch("http://localhost:5000/api/login", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ name, password })
        });

        let data = await response.json();

        if (data.success) {
          // Save to localStorage for frontend state (e.g. name, role)
          // We map 'KEYS.current' as seen in other files or just "loggedInUser"
          localStorage.setItem("loggedInUser", JSON.stringify(data.user));
          localStorage.setItem("current", JSON.stringify(data.user)); // Some pages use "current"

          // Redirect to dashboard
          window.location.href = "dashboard.html"; // Make sure to redirect to correct page, could be index.html or Final Project.html depending on setup
        } else {
          alert("Login Failed: " + data.message);
        }
      } catch (error) {
        console.error("Error:", error);
        alert("Failed to connect to the server. Is the backend running?");
      }
    }
  </script>
</body>
</html>
